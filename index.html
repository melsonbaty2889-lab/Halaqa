<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>الحلقة الذكية | Smart Halaqa</title>
    <style>
      :root { --bg-color: #0a0f24; --brand-green: #00c853; }
      body { background-color: var(--bg-color); margin: 0; overflow-x: hidden; }
      
      .app-loading-screen {
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        height: 100vh; width: 100vw; background-color: var(--bg-color);
        position: fixed; top: 0; left: 0; z-index: 9999;
        transition: opacity 0.4s ease-in-out;
      }
      .app-loader { 
        width: 50px; height: 50px; 
        border: 3px solid rgba(0, 200, 83, 0.1); 
        border-radius: 50%; border-top-color: var(--brand-green); 
        animation: spin-loader 0.8s linear infinite; 
      }
      @keyframes spin-loader { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>

    <!-- الدائرة الخضراء -->
    <div class="app-loading-screen" id="fallback-loader">
      <div class="app-loader"></div>
    </div>

    <!-- جذر التطبيق -->
    <div id="root"></div>
    
    <!-- تشغيل التطبيق -->
    <script type="module" src="/src/main.jsx"></script>

    <!-- 🚨 صمام الأمان القاطع (يقتل الدائرة بعد 3 ثوانٍ مهما حدث في React) -->
    <script>
      setTimeout(function() {
        var loader = document.getElementById('fallback-loader');
        if (loader) {
          console.warn("🚨 صمام الأمان التدخلي: تم حذف الدائرة الخضراء إجبارياً من index.html");
          loader.style.opacity = '0';
          setTimeout(function() { loader.remove(); }, 400);
        }
      }, 3000); // 3 ثوانٍ كحد أقصى تظهر فيه الدائرة
    </script>
  </body>
</html>

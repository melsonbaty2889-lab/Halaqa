<!DOCTYPE html>
<html lang="ar" dir="rtl">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>الحلقة الذكية | Smart Halaqa</title>
    <style>
      :root { --bg-color: #0a0f24; --brand-green: #00c853; }
      body { background-color: var(--bg-color); margin: 0; }
      .app-loading-screen {
        display: flex; flex-direction: column; align-items: center; justify-content: center;
        height: 100vh; width: 100vw; background-color: var(--bg-color);
        position: fixed; top: 0; left: 0; z-index: 9999;
      }
      .app-loader { width: 50px; height: 50px; border: 3px solid rgba(0, 200, 83, 0.1); border-radius: 50%; border-top-color: var(--brand-green); animation: spin-loader 0.8s linear infinite; }
      @keyframes spin-loader { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <div class="app-loading-screen">
      <div class="app-loader"></div>
    </div>

    <div id="root"></div>
    
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
